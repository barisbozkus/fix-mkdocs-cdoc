name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Step 1 - Environment setup
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install flake8 mypy pylint pytest pytest-cov mkdocs

    - name: Step 2 - Static analysis
      run: |
        flake8 mkdocs_cdoc/
        mypy --ignore-missing-imports mkdocs_cdoc/
        pylint mkdocs_cdoc/

    - name: Step 3 & 4 - Unit tests and Coverage report
      run: |
        pytest --cov=mkdocs_cdoc tests/

    - name: Step 5 - Build validation
      run: |
        mkdocs build -f example/mkdocs.yml
